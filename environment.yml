name: biosec
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  # PyTorch — latest stable, numpy 2.x compatible
  - pytorch::pytorch
  - pytorch::pytorch-cuda=12.1
  # bioinformatics
  - bioconda::blast
  - biopython
  # pip-managed packages
  - pip:
      - transformers==4.49.0
      - huggingface_hub
      - datasets<3.0.0
      - accelerate>=0.26.0
      - scikit-learn
      - matplotlib
      - seaborn
      - numpy
      - tqdm
      - deepspeed
      - wandb
