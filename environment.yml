name: biosec
channels:
  - pytorch
  - nvidia
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  # PyTorch via pytorch channel (handles CUDA automatically)
  - pytorch::pytorch=2.2.0
  - pytorch::pytorch-cuda=11.8
  # bioinformatics
  - bioconda::blast
  - biopython
  # pip-managed packages
  - pip:
      - transformers==4.49.0
      - huggingface_hub
      - datasets<3.0.0
      - scikit-learn
      - matplotlib
      - seaborn
      - numpy
      - tqdm
      - deepspeed
      - wandb
