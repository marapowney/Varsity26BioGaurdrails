<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evo2 7B Probing Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232733;
    --border: #2e3345;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: #3d5aad;
    --good: #4ade80;
    --warn: #fbbf24;
    --bad: #f87171;
    --radius: 8px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    background: var(--surface);
  }
  header h1 { font-size: 18px; font-weight: 600; white-space: nowrap; }
  header .subtitle { font-size: 13px; color: var(--text-dim); }

  .main-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 0;
    overflow: hidden;
    min-height: 0;
  }

  .content-area {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  /* LEFT PANEL */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .probe-selector {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .probe-selector h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .probe-group { display: flex; flex-direction: column; gap: 4px; }
  .probe-btn {
    display: block;
    width: 100%;
    padding: 8px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .probe-btn:hover { background: var(--surface2); border-color: var(--accent-dim); }
  .probe-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .arch-section {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .arch-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 8px;
    align-self: flex-start;
    padding-left: 4px;
  }

  .arch-block {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .arch-endpoint {
    width: 90%;
    padding: 6px 0;
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    letter-spacing: 0.5px;
  }
  .arch-connector {
    width: 2px;
    height: 6px;
    background: var(--border);
  }

  .layer-btn {
    width: 90%;
    padding: 5px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
    text-align: center;
  }
  .layer-btn:hover { border-color: var(--accent-dim); background: #262a38; }
  .layer-btn.active {
    border-color: var(--accent);
    background: var(--accent-dim);
    color: #fff;
    box-shadow: 0 0 8px rgba(108,140,255,0.25);
  }

  /* CENTER PANEL */
  .center-panel {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex-shrink: 0;
  }

  .center-placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  .panel-title {
    font-size: 15px;
    font-weight: 600;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .panel-title .tag {
    font-size: 11px;
    font-weight: 400;
    color: var(--accent);
    background: rgba(108,140,255,0.12);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .config-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--text-dim);
  }
  .config-bar span { background: var(--surface2); padding: 3px 8px; border-radius: 4px; }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    text-align: center;
  }
  .metric-card .label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .metric-card .number { font-size: 20px; font-weight: 700; }

  .chart-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .chart-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    min-height: 280px;
  }
  .chart-box.full-width { grid-column: 1 / -1; }

  /* RIGHT PANEL */
  .right-panel {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .compare-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
  }
  .compare-controls select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
  }

  .cross-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    min-height: 300px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .loading-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    font-size: 16px;
    color: var(--text-dim);
  }
  .loading-overlay.hidden { display: none; }

  @media (max-width: 700px) {
    .main-grid { grid-template-columns: 1fr; }
    .left-panel { flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .arch-section { flex-direction: row; overflow-x: auto; overflow-y: hidden; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">Loading dashboard data...</div>

<header>
  <h1>Evo2 7B Probing Dashboard</h1>
  <span class="subtitle">BRCA1 Variant Classification &mdash; Linear &amp; MLP Probes Across 32 Transformer Layers</span>
</header>

<div class="main-grid">
  <!-- LEFT -->
  <div class="left-panel">
    <div class="probe-selector">
      <h3>Probe Type</h3>
      <div class="probe-group" id="probeGroup"></div>
    </div>
    <div class="arch-section" id="archSection">
      <h3>Evo2 7B Architecture</h3>
      <div id="archDiagram"></div>
    </div>
  </div>

  <!-- CONTENT AREA (center + right stacked vertically) -->
  <div class="content-area">
    <div class="center-panel" id="centerPanel">
      <div class="center-placeholder" id="centerPlaceholder">
        Select a layer from the architecture diagram to view results
      </div>
      <div id="layerResults" style="display:none;">
        <div class="panel-title">
          <span id="layerTitle">Layer 0</span>
          <span class="tag" id="layerTag"></span>
        </div>
        <div class="config-bar" id="configBar"></div>
        <div class="metrics-grid" id="metricsGrid"></div>
        <div class="chart-row">
          <div class="chart-box" id="confusionChart"></div>
          <div class="chart-box" id="rocChart"></div>
        </div>
      </div>
    </div>

    <div class="right-panel">
      <div class="panel-title">
        <span>Cross-Layer Analysis</span>
      </div>
      <div class="compare-controls">
        <label>Compare with:</label>
        <select id="compareSelect"><option value="">None</option></select>
      </div>
      <div class="cross-chart" id="crossAurocChart"></div>
      <div class="cross-chart" id="crossAccChart"></div>
    </div>
  </div>
</div>

<script>
const PLOTLY_LAYOUT_BASE = {
  paper_bgcolor: 'rgba(0,0,0,0)',
  plot_bgcolor: 'rgba(0,0,0,0)',
  font: { color: '#e1e4ed', family: 'Inter, sans-serif', size: 11 },
  margin: { l: 50, r: 20, t: 36, b: 42 },
  xaxis: { gridcolor: '#2e3345', zerolinecolor: '#2e3345' },
  yaxis: { gridcolor: '#2e3345', zerolinecolor: '#2e3345' },
};

const PLOTLY_CONFIG = { responsive: true, displayModeBar: false };

let DATA = null;
let currentProbe = 'linear_full';
let selectedLayer = null;

function aurocColor(v) {
  if (v >= 0.8) return '#4ade80';
  if (v >= 0.7) return '#86efac';
  if (v >= 0.6) return '#fbbf24';
  if (v >= 0.5) return '#fb923c';
  return '#f87171';
}

function fmtNum(v, digits = 3) {
  if (v == null) return '—';
  return v.toFixed(digits);
}

/* ── PROBE SELECTOR ── */
function renderProbeSelector() {
  const grp = document.getElementById('probeGroup');
  grp.innerHTML = '';
  for (const [key, probe] of Object.entries(DATA.probes)) {
    const btn = document.createElement('button');
    btn.className = 'probe-btn' + (key === currentProbe ? ' active' : '');
    btn.textContent = probe.label;
    btn.onclick = () => {
      currentProbe = key;
      selectedLayer = null;
      renderAll();
    };
    grp.appendChild(btn);
  }
}

/* ── ARCHITECTURE DIAGRAM ── */
function renderArchitecture() {
  const container = document.getElementById('archDiagram');
  container.innerHTML = '';
  const probe = DATA.probes[currentProbe];

  const block = document.createElement('div');
  block.className = 'arch-block';

  // Output head
  const outHead = document.createElement('div');
  outHead.className = 'arch-endpoint';
  outHead.textContent = 'OUTPUT HEAD';
  block.appendChild(outHead);

  // Layers 31 → 0 (top to bottom)
  for (let i = 31; i >= 0; i--) {
    const conn = document.createElement('div');
    conn.className = 'arch-connector';
    block.appendChild(conn);

    const btn = document.createElement('button');
    btn.className = 'layer-btn' + (selectedLayer === i ? ' active' : '');
    btn.textContent = `Block ${i}`;
    btn.onclick = () => {
      selectedLayer = i;
      renderAll();
    };
    block.appendChild(btn);
  }

  const connBot = document.createElement('div');
  connBot.className = 'arch-connector';
  block.appendChild(connBot);

  const embed = document.createElement('div');
  embed.className = 'arch-endpoint';
  embed.textContent = 'INPUT EMBEDDING';
  block.appendChild(embed);

  container.appendChild(block);
}

/* ── LAYER RESULTS (CENTER) ── */
function renderLayerResults() {
  const placeholder = document.getElementById('centerPlaceholder');
  const results = document.getElementById('layerResults');

  if (selectedLayer === null) {
    placeholder.style.display = 'flex';
    results.style.display = 'none';
    return;
  }

  placeholder.style.display = 'none';
  results.style.display = 'block';

  const probe = DATA.probes[currentProbe];
  const layer = probe.layers[String(selectedLayer)];
  const cfg = layer.config;
  const test = layer.test;

  document.getElementById('layerTitle').textContent = `Block ${selectedLayer}`;
  document.getElementById('layerTag').textContent = probe.label;

  // Config bar
  const configBar = document.getElementById('configBar');
  const params = cfg.best_params || {};
  const paramStr = Object.entries(params).map(([k, v]) => `${k}: ${v}`).join(', ');
  configBar.innerHTML = `<span>Model: ${cfg.model}</span><span>Feature: ${cfg.feature_type}</span><span>Params: ${paramStr}</span><span>Calibrated: ${cfg.calibrated}</span>`;

  // Metrics grid (test only)
  const metrics = ['accuracy', 'f1', 'precision', 'recall', 'auroc', 'auprc'];
  const grid = document.getElementById('metricsGrid');
  grid.innerHTML = metrics.map(m => `
    <div class="metric-card">
      <div class="label">${m.toUpperCase()}</div>
      <div class="number" style="color:${aurocColor(test[m])}">${fmtNum(test[m])}</div>
    </div>
  `).join('');

  renderConfusionMatrix(test.confusion_matrix);
  renderROCCurve(test.roc_curve, test.auroc);
}

function renderConfusionMatrix(testCm) {
  const z = [[testCm.tp, testCm.fn], [testCm.fp, testCm.tn]];
  const annotations = [];
  const labels_y = ['Positive (Unsafe)', 'Negative (Safe)'];
  const labels_x = ['Predicted Pos', 'Predicted Neg'];

  for (let i = 0; i < 2; i++) {
    for (let j = 0; j < 2; j++) {
      annotations.push({
        x: labels_x[j], y: labels_y[i],
        text: String(z[i][j]),
        font: { color: '#fff', size: 16, family: 'Inter, sans-serif' },
        showarrow: false
      });
    }
  }

  const trace = {
    z: z,
    x: labels_x,
    y: labels_y,
    type: 'heatmap',
    colorscale: [[0, '#1e293b'], [0.5, '#3d5aad'], [1, '#6c8cff']],
    showscale: false,
    hovertemplate: '%{y}<br>%{x}<br>Count: %{z}<extra></extra>'
  };

  const layout = {
    ...PLOTLY_LAYOUT_BASE,
    title: { text: 'Test Confusion Matrix', font: { size: 13 } },
    annotations: annotations,
    xaxis: { ...PLOTLY_LAYOUT_BASE.xaxis, title: 'Predicted' },
    yaxis: { ...PLOTLY_LAYOUT_BASE.yaxis, title: 'Actual', autorange: 'reversed' },
    margin: { l: 120, r: 20, t: 40, b: 60 },
  };

  Plotly.newPlot('confusionChart', [trace], layout, PLOTLY_CONFIG);
}

function renderROCCurve(testRoc, testAuroc) {
  const traces = [
    {
      x: [0, 1], y: [0, 1],
      mode: 'lines',
      line: { color: '#555', dash: 'dash', width: 1 },
      name: 'Random',
      hoverinfo: 'skip'
    },
    {
      x: testRoc.fpr, y: testRoc.tpr,
      mode: 'lines',
      name: `AUROC = ${fmtNum(testAuroc)}`,
      line: { color: '#6c8cff', width: 2.5 }
    }
  ];

  const layout = {
    ...PLOTLY_LAYOUT_BASE,
    title: { text: 'ROC Curve', font: { size: 13 } },
    xaxis: { ...PLOTLY_LAYOUT_BASE.xaxis, title: 'False Positive Rate', range: [0, 1] },
    yaxis: { ...PLOTLY_LAYOUT_BASE.yaxis, title: 'True Positive Rate', range: [0, 1.02] },
    legend: { x: 0.4, y: 0.08, bgcolor: 'rgba(0,0,0,0.5)', font: { size: 10 } },
    showlegend: true,
  };

  Plotly.newPlot('rocChart', traces, layout, PLOTLY_CONFIG);
}

/* ── CROSS-LAYER CHARTS (RIGHT) ── */
function renderCrossLayerCharts() {
  const probe = DATA.probes[currentProbe];
  const compareKey = document.getElementById('compareSelect').value;
  const compareProbe = compareKey ? DATA.probes[compareKey] : null;

  const layers = Array.from({ length: 32 }, (_, i) => i);
  const x = layers;

  function extract(p, metric) {
    return layers.map(i => p.layers[String(i)]?.test?.[metric] ?? null);
  }

  // AUROC & AUPRC chart
  const aurocTraces = [
    { x, y: extract(probe, 'auroc'), name: `AUROC (${probe.label})`, line: { color: '#6c8cff', width: 2.5 }, mode: 'lines+markers', marker: { size: 5 } },
    { x, y: extract(probe, 'auprc'), name: `AUPRC (${probe.label})`, line: { color: '#a78bfa', width: 2 }, mode: 'lines+markers', marker: { size: 5 } },
  ];
  if (compareProbe) {
    aurocTraces.push(
      { x, y: extract(compareProbe, 'auroc'), name: `AUROC (${compareProbe.label})`, line: { color: '#4ade80', width: 2, dash: 'dot' }, mode: 'lines+markers', marker: { size: 4 } },
      { x, y: extract(compareProbe, 'auprc'), name: `AUPRC (${compareProbe.label})`, line: { color: '#34d399', width: 1.5, dash: 'dot' }, mode: 'lines+markers', marker: { size: 4 } },
    );
  }

  const aurocLayout = {
    ...PLOTLY_LAYOUT_BASE,
    title: { text: 'AUROC & AUPRC Across Layers (Test)', font: { size: 13 } },
    xaxis: { ...PLOTLY_LAYOUT_BASE.xaxis, title: 'Layer', dtick: 2 },
    yaxis: { ...PLOTLY_LAYOUT_BASE.yaxis, title: 'Score', range: [0.4, 1] },
    legend: { x: 0.01, y: 0.99, bgcolor: 'rgba(0,0,0,0.4)', font: { size: 10 } },
    showlegend: true,
    hovermode: 'x unified',
  };

  Plotly.newPlot('crossAurocChart', aurocTraces, aurocLayout, PLOTLY_CONFIG);

  // Accuracy, F1, Precision, Recall chart
  const accTraces = [
    { x, y: extract(probe, 'accuracy'), name: `Accuracy (${probe.label})`, line: { color: '#fb923c', width: 2.5 }, mode: 'lines+markers', marker: { size: 5 } },
    { x, y: extract(probe, 'f1'), name: `F1 (${probe.label})`, line: { color: '#f87171', width: 2 }, mode: 'lines+markers', marker: { size: 5 } },
    { x, y: extract(probe, 'precision'), name: `Precision (${probe.label})`, line: { color: '#e879f9', width: 2 }, mode: 'lines+markers', marker: { size: 5 } },
    { x, y: extract(probe, 'recall'), name: `Recall (${probe.label})`, line: { color: '#fbbf24', width: 2 }, mode: 'lines+markers', marker: { size: 5 } },
  ];
  if (compareProbe) {
    accTraces.push(
      { x, y: extract(compareProbe, 'accuracy'), name: `Accuracy (${compareProbe.label})`, line: { color: '#38bdf8', width: 2, dash: 'dot' }, mode: 'lines+markers', marker: { size: 4 } },
      { x, y: extract(compareProbe, 'f1'), name: `F1 (${compareProbe.label})`, line: { color: '#22d3ee', width: 1.5, dash: 'dot' }, mode: 'lines+markers', marker: { size: 4 } },
      { x, y: extract(compareProbe, 'precision'), name: `Precision (${compareProbe.label})`, line: { color: '#c084fc', width: 1.5, dash: 'dot' }, mode: 'lines+markers', marker: { size: 4 } },
      { x, y: extract(compareProbe, 'recall'), name: `Recall (${compareProbe.label})`, line: { color: '#d4a017', width: 1.5, dash: 'dot' }, mode: 'lines+markers', marker: { size: 4 } },
    );
  }

  const accLayout = {
    ...PLOTLY_LAYOUT_BASE,
    title: { text: 'Classification Metrics Across Layers (Test)', font: { size: 13 } },
    xaxis: { ...PLOTLY_LAYOUT_BASE.xaxis, title: 'Layer', dtick: 2 },
    yaxis: { ...PLOTLY_LAYOUT_BASE.yaxis, title: 'Score', range: [0.2, 1] },
    legend: { x: 0.01, y: 0.99, bgcolor: 'rgba(0,0,0,0.4)', font: { size: 10 } },
    showlegend: true,
    hovermode: 'x unified',
  };

  Plotly.newPlot('crossAccChart', accTraces, accLayout, PLOTLY_CONFIG);

  // Click-to-select layer from cross-layer charts
  ['crossAurocChart', 'crossAccChart'].forEach(id => {
    document.getElementById(id).on('plotly_click', function(d) {
      if (d.points && d.points.length > 0) {
        selectedLayer = d.points[0].x;
        renderAll();
      }
    });
  });
}

function renderCompareSelect() {
  const sel = document.getElementById('compareSelect');
  const prev = sel.value;
  sel.innerHTML = '<option value="">None</option>';
  for (const [key, probe] of Object.entries(DATA.probes)) {
    if (key === currentProbe) continue;
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = probe.label;
    if (key === prev) opt.selected = true;
    sel.appendChild(opt);
  }
}

/* ── RENDER ALL ── */
function renderAll() {
  renderProbeSelector();
  renderArchitecture();
  renderLayerResults();
  renderCompareSelect();
  renderCrossLayerCharts();

  if (selectedLayer !== null) {
    const btn = document.querySelectorAll('.layer-btn')[31 - selectedLayer];
    if (btn) btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

/* ── INIT ── */
async function init() {
  try {
    const resp = await fetch('dashboard_data.json');
    DATA = await resp.json();
  } catch (e) {
    document.getElementById('loadingOverlay').textContent = 'Error loading data: ' + e.message;
    return;
  }

  document.getElementById('loadingOverlay').classList.add('hidden');

  document.getElementById('compareSelect').addEventListener('change', renderCrossLayerCharts);

  renderAll();
}

init();
</script>
</body>
</html>
